services:
  - type: web
    name: umfind
    runtime: php
    buildCommand: |
      composer install --optimize-autoloader --no-dev
      npm ci
      npm run build
      php artisan storage:link
      php artisan config:clear
      php artisan cache:clear
      php artisan view:clear
      php artisan migrate --force
    startCommand: |
      php artisan config:clear
      php artisan cache:clear
      php artisan view:clear
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://umfind-lost-and-found-system.onrender.com
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_DOMAIN
        value: .onrender.com
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: SESSION_SAME_SITE
        value: lax
      - key: SESSION_LIFETIME
        value: 120
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: your-database-host.render.com
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: your-database-name
      - key: DB_USERNAME
        value: your-username
      - key: DB_PASSWORD
        value: your-password
      - key: TRUSTED_PROXIES
        value: "*"